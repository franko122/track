<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Device Offline</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f7fb;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.card{
    width:100%;
    max-width:420px;
    background:#fff;
    border-radius:20px;
    padding:35px 25px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.icon{
    width:90px;
    height:90px;
    margin:auto;
    background:#ffe5e5;
    color:#e53935;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
}

h1{
    margin-top:20px;
    color:#222;
    font-size:28px;
}

.status{
    margin-top:10px;
    color:#e53935;
    font-weight:bold;
    font-size:18px;
}

.message{
    margin-top:15px;
    color:#666;
    line-height:1.6;
    font-size:15px;
}

.info{
    margin-top:25px;
    background:#f8fafc;
    border-radius:12px;
    padding:15px;
    text-align:left;
}

.info div{
    display:flex;
    justify-content:space-between;
    padding:10px 0;
    border-bottom:1px solid #eee;
}

.info div:last-child{
    border-bottom:none;
}

.label{
    color:#666;
}

.value{
    color:#222;
    font-weight:600;
}

.button{
    margin-top:25px;
    display:inline-block;
    background:#2563eb;
    color:#fff;
    text-decoration:none;
    padding:12px 25px;
    border-radius:10px;
    transition:.3s;
}

.button:hover{
    background:#1d4ed8;
}
</style>
</head>
<body>

<div class="card">
    <div class="icon"></div>

    <h1>Device online </h1>

    <div class="status">Currently Powered On</div>

    <p class="message">
        This device is currently switched on or available.
        Location updates and online services can be accessed 
    </p>

    <div class="info">
        <div>
            <span class="label">Device Status</span>
            <span class="value">online</span>
        </div>

        <div>
            <span class="label">Last Seen</span>
            <span class="value">Today, 8:22 AM</span>
        </div>

        <div>
            <span class="label">Battery</span>
            <span class="value">available</span>
        </div>
    </div>

    <a href="#" class="button">Refresh Status</a>
</div>

</body>
</html>
